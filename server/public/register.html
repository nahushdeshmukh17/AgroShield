<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AgroShield — Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body class="bg-[#0a0f0a] text-white min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <span class="text-4xl">🌾</span>
      <h1 class="text-2xl font-bold mt-2">AgroShield</h1>
      <p class="text-gray-500 text-sm mt-1">Create your free account</p>
    </div>

    <div class="bg-white/[0.03] border border-white/10 rounded-2xl p-8">
      <div id="error" class="hidden mb-4 text-sm text-red-400 bg-red-500/10 border border-red-500/20 rounded-xl px-4 py-3"></div>
      <div class="space-y-4">
        <div>
          <label class="text-xs text-gray-400 block mb-1.5">Full Name</label>
          <input id="name" type="text" placeholder="Your name"
            class="w-full bg-white/5 border border-white/10 text-white placeholder-gray-600 px-4 py-3 rounded-xl text-sm focus:outline-none focus:border-green-500/50"/>
        </div>
        <div>
          <label class="text-xs text-gray-400 block mb-1.5">Email</label>
          <input id="email" type="email" placeholder="you@example.com"
            class="w-full bg-white/5 border border-white/10 text-white placeholder-gray-600 px-4 py-3 rounded-xl text-sm focus:outline-none focus:border-green-500/50"/>
        </div>
        <div>
          <label class="text-xs text-gray-400 block mb-1.5">Password</label>
          <input id="password" type="password" placeholder="Min 6 characters"
            class="w-full bg-white/5 border border-white/10 text-white placeholder-gray-600 px-4 py-3 rounded-xl text-sm focus:outline-none focus:border-green-500/50"/>
        </div>
        <button onclick="register()" id="btn"
          class="w-full bg-green-500 hover:bg-green-400 text-black font-bold py-3 rounded-xl text-sm transition-all hover:scale-[1.02]">
          Create Account
        </button>
      </div>
    </div>

    <p class="text-center text-sm text-gray-500 mt-6">
      Already have an account?
      <a href="login.html" class="text-green-400 hover:text-green-300 ml-1">Sign in</a>
    </p>
  </div>

  <script>
    async function register() {
      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('error');
      const btn      = document.getElementById('btn');
      errEl.classList.add('hidden');

      if (!name || !email || !password) {
        errEl.textContent = 'Please fill in all fields';
        errEl.classList.remove('hidden');
        return;
      }
      if (password.length < 6) {
        errEl.textContent = 'Password must be at least 6 characters';
        errEl.classList.remove('hidden');
        return;
      }

      btn.textContent = 'Creating account...';
      btn.disabled = true;

      const res  = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });
      const data = await res.json();

      if (!res.ok) {
        errEl.textContent = data.error;
        errEl.classList.remove('hidden');
        btn.textContent = 'Create Account';
        btn.disabled = false;
        return;
      }

      window.location.href = '/home.html';
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') register(); });
  </script>
</body>
</html>
